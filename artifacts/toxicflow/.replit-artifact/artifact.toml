kind = "web"
previewPath = "/"
title = "ToxicFlow Passport"
version = "1.0.0"
id = "artifacts/toxicflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21495

[services.development]
run = "pnpm --filter @workspace/toxicflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toxicflow", "run", "build" ]
publicDir = "artifacts/toxicflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21495"
BASE_PATH = "/"
